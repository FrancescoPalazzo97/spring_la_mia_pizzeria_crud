<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <div th:replace="~{fragments/resources :: headTags}"></div>
    <title>Books</title>
</head>
<body>
    <nav></nav>

    <main>
        <nav th:replace="~{fragments/nav :: navbar('pizzas')}"></nav>

        <div class="container">
            <h1>Pizze</h1>
            <hr>

            <div class="mb-3 d-flex">
                <a th:href="@{/pizzas/create}" class="me-auto btn btn-primary btn-sm">Create a new pizza</a>
            </div>

            <section class="row">
                <div class="col-12">
                    <table class="table" th:if="${pizzas.size() > 0}">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>name</th>
                                <th>bio</th>
                                <th>price</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="pizza : ${pizzas}" th:object="${pizza}">
                                <td>[[*{id}]]</td>
                                <td> <a th:href="@{|/pizzas/*{id}|}">[[*{name}]]</a></td>
                                <td>[[*{bio}]]</td>
                                <td>[[*{price / 100}]] &euro;</td>
                            </tr>
                        </tbody>
                    </table>

                    <p th:text="No books available at this moment..." th:unless="${pizzas.size() > 0}"></p>
                </div>
            </section>
        </div>
    </main>

    <script th:replace="~{fragments/resources :: scripts}"></script>
</body>
</html>
